version: "1"

node:
  id: "001"
  name: "Node001 Toronto"
  hostname: "pooly-ssdnodes-001-toronto"
  region: "toronto"
  role: "mining-node"
  environment: "production"
  ring: "alpha"

api:
  enabled: true
  bind: "127.0.0.1:9587"

logging:
  level: "info"
  format: "text"

commands:
  systemctl: /bin/systemctl
  journalctl: /bin/journalctl
  sshd: /usr/sbin/sshd
  ss: /usr/sbin/ss
  ufw: /usr/sbin/ufw
  visudo: /usr/sbin/visudo
  auditctl: /usr/sbin/auditctl
  ausearch: /usr/sbin/ausearch

resources:
  enabled: true
  interval: 30s
  timeout: 3s

  cpu:
    enabled: true

  memory:
    enabled: true

  pressure:
    enabled: true
    missing_is_ok: true

  filesystem:
    enabled: true
    mounts:
      - /
      - /home
      - /var
      - /var/log
      - /var/lib
      - /var/lib/pooly-sentinel
      - /var/log/pooly-sentinel

  diskio:
    enabled: true
    auto_discover: true
    exclude:
      - loop*
      - ram*
      - fd*
      - sr*

  network:
    enabled: true
    auto_discover: true
    include: []
    exclude:
      - lo
      - docker*
      - veth*
      - br-*

  uptime:
    enabled: true

systemd:
  enabled: false
  interval: 30s
  timeout: 3s
  critical_services:
    - ssh.service
    - fail2ban.service
    - pooly-sentinel-agent.service
    - miningcore.service

ssh:
  enabled: false
  interval: 5m
  timeout: 3s
  event_driven: true
  expected:
    ports: [6200]
    forbidden_ports: [22]
    permitrootlogin: "no"
    passwordauthentication: "no"
    kbdinteractiveauthentication: "no"
    permitemptypasswords: "no"
    pubkeyauthentication: "yes"
    strictmodes: "yes"
    permituserenvironment: "no"

journal:
  auth:
    enabled: false
    interval: 10s
    timeout: 3s
    max_records: 100
    max_bytes: 262144
    max_field_bytes: 512
  services:
    enabled: false
    interval: 30s
    timeout: 3s
    max_records: 100
    max_bytes: 262144
    max_field_bytes: 512
  kernel:
    enabled: false
    interval: 60s
    timeout: 3s
    max_records: 100
    max_bytes: 262144
    max_field_bytes: 512

filewatch:
  enabled: false
  debounce: 2s
  periodic_verify_interval: 5m
  timeout: 3s
  max_file_bytes: 1048576
  max_directory_entries: 256
  targets:
    - name: sshd_config
      path: /etc/ssh/sshd_config
      type: file
      hash: true
      manifest: false
      allow_private_key_hash: false
    - name: sudoers_dir
      path: /etc/sudoers.d
      type: directory
      hash: false
      manifest: true
      allow_private_key_hash: false

audit:
  enabled: false
  mode: observe_only
  manage_rules: false

rules:
  - id: cpu-used-sustained
    enabled: true
    collector: resources
    metric: pooly_cpu_used_ratio
    target: system
    warn:
      operator: greater_than_or_equal
      value: 0.85
      for: 10m
    fail:
      operator: greater_than_or_equal
      value: 0.95
      for: 10m
    recover_for: 5m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: memory-available-low
    enabled: true
    collector: resources
    metric: pooly_memory_available_ratio
    target: system
    warn:
      operator: less_than
      value: 0.15
      for: 10m
    fail:
      operator: less_than
      value: 0.08
      for: 10m
    critical:
      operator: less_than
      value: 0.04
      for: 5m
    recover_for: 5m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: filesystem-capacity-high
    enabled: true
    collector: filesystem
    metric: pooly_filesystem_used_ratio
    target: any
    warn:
      operator: greater_than_or_equal
      value: 0.85
      for: 10m
    fail:
      operator: greater_than_or_equal
      value: 0.95
      for: 10m
    recover_for: 5m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: filesystem-inodes-high
    enabled: true
    collector: filesystem
    metric: pooly_filesystem_inodes_used_ratio
    target: any
    warn:
      operator: greater_than_or_equal
      value: 0.85
      for: 10m
    fail:
      operator: greater_than_or_equal
      value: 0.95
      for: 10m
    recover_for: 5m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: required-network-interface-down
    enabled: false
    collector: network
    metric: pooly_network_interface_up
    target: eth0
    fail:
      operator: boolean_false
      for: 2m
    recover_for: 2m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: required-systemd-service-failed
    enabled: false
    collector: systemd
    metric: pooly_systemd_unit_failed
    target: ssh.service
    fail:
      operator: boolean_true
      for: 1m
    recover_for: 2m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: forbidden-ssh-listener
    enabled: false
    collector: ssh_listeners
    metric: pooly_ssh_forbidden_port_listening
    target: "22"
    fail:
      operator: boolean_true
      for: 1m
    recover_for: 2m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: ssh-hardening-drift
    enabled: false
    collector: ssh_effective_config
    metric: pooly_ssh_directive_expected_match
    target: any
    warn:
      operator: boolean_false
      for: 5m
    fail:
      operator: boolean_false
      for: 30m
    recover_for: 5m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} threshold state for {{target}}"

  - id: kernel-oom-event
    enabled: false
    collector: journal
    event_category: kernel_oom
    target: kernel
    fail:
      operator: event_category_match
      value: kernel_oom
      for: 0s
    recover_for: 5m
    missing_data: stale
    stale_data: stale
    summary: "{{rule_id}} event state for {{target}}"

notification:
  paid_receivers_enabled_by_default: false

receivers:
  - name: local_file
    type: file
    cost_class: free_core
    enabled: true

  - name: discord_primary
    type: discord
    cost_class: free_external
    enabled: false
    webhook_env: POOLY_DISCORD_WEBHOOK

  - name: pushover_critical
    type: pushover
    cost_class: paid_external
    enabled: false

storage:
  state_dir: /var/lib/pooly-sentinel
  log_dir: /var/log/pooly-sentinel
  database_file: state.db
  current_metrics_file: metrics-current.json
  sqlite:
    busy_timeout: 5s
    wal: true
